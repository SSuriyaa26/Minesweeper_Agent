<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=6">
</head>
<body>
    <div class="app-wrapper">
        <nav class="top-nav">
            <div class="nav-brand">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                <span>Minesweeper Inference Engine</span>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <button id="theme-toggle" class="btn-theme" title="Toggle Light/Dark Mode">
                    <svg id="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <svg id="icon-sun" class="covered" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </button>
                <div class="nav-status">
                    <div class="status-indicator">
                        <span class="pulse-dot" id="status-dot"></span>
                        <span id="chip-status">Standby</span>
                    </div>
                </div>
            </div>
        </nav>

        <div class="main-layout">
            <!-- Left: Config & Execution -->
            <aside class="sidebar">
                <div class="control-section">
                    <h2 class="section-heading">Configuration</h2>
                    <div class="input-group">
                        <label>Difficulty Matrix</label>
                        <select id="board-size" class="sleek-select">
                            <option value="9,9,10">Beginner (9x9, 10 mines)</option>
                            <option value="16,16,40">Intermediate (16x16, 40 mines)</option>
                            <option value="16,30,99">Expert (16x30, 99 mines)</option>
                        </select>
                    </div>
                    <button id="btn-new-game" class="btn-primary">Initialize Engine</button>
                </div>

                <div class="control-section">
                    <h2 class="section-heading">Execution</h2>
                    <div class="btn-group">
                        <button id="btn-agent-step" class="btn-secondary">Step</button>
                        <button id="btn-agent-auto" class="btn-secondary">Auto-Run</button>
                    </div>
                    <div class="slider-group hidden" id="speed-control">
                        <div class="slider-header">
                            <label>Delay</label>
                            <span id="speed-value-ms">200ms</span>
                        </div>
                        <input type="range" id="speed-slider" min="30" max="800" value="200" step="10">
                    </div>
                </div>

                <div class="control-section">
                    <h2 class="section-heading">Telemetry</h2>
                    <div class="telemetry-grid">
                        <div class="metric"><span class="label">Total Games</span><span class="value" id="stat-games">0</span></div>
                        <div class="metric"><span class="label">Win Rate</span><span class="value" id="stat-winrate">0%</span></div>
                        <div class="metric"><span class="label">Exec Moves</span><span class="value" id="stat-total-moves">0</span></div>
                        <div class="metric"><span class="label">Active Mines</span><span class="value" id="game-mines">0</span></div>
                    </div>
                </div>
            </aside>

            <!-- Center: Engine View -->
            <main class="board-area">
                <div class="pipeline-tracker">
                    <div class="node" id="pipe-csp">CSP</div>
                    <div class="edge"></div>
                    <div class="node" id="pipe-forward">FC</div>
                    <div class="edge"></div>
                    <div class="node" id="pipe-backtrack">BT</div>
                    <div class="edge"></div>
                    <div class="node" id="pipe-prob">PROB</div>
                </div>

                <div class="board-glass">
                    <div id="board-container" class="board"></div>
                    
                    <div id="game-overlay" class="game-overlay hidden">
                        <div class="overlay-card">
                            <h3 id="overlay-title">Terminal State</h3>
                            <p id="overlay-subtitle">Execution halted.</p>
                            <button id="btn-overlay-new" class="btn-primary">Reset</button>
                        </div>
                    </div>
                </div>
                <div class="board-footer">Model execution step: <span id="move-number">0</span></div>
            </main>

            <!-- Right: Insights -->
            <aside class="log-sidebar">
                <div class="section-heading">Execution Trace</div>
                <div class="trace-container" id="log-container">
                    <div class="trace-empty">Awaiting execution...</div>
                </div>
                
                <div class="section-heading mt-4">Algorithm Distribution</div>
                <div class="distribution-bars">
                    <div class="dist-row">
                        <span class="dist-label">CSP</span>
                        <div class="dist-track"><div class="dist-fill fill-csp" id="bar-csp"></div></div>
                        <span class="dist-val" id="count-csp">0</span>
                    </div>
                    <div class="dist-row">
                        <span class="dist-label">FC</span>
                        <div class="dist-track"><div class="dist-fill fill-fc" id="bar-fc"></div></div>
                        <span class="dist-val" id="count-fc">0</span>
                    </div>
                    <div class="dist-row">
                        <span class="dist-label">BT</span>
                        <div class="dist-track"><div class="dist-fill fill-bt" id="bar-bt"></div></div>
                        <span class="dist-val" id="count-bt">0</span>
                    </div>
                    <div class="dist-row">
                        <span class="dist-label">PROB</span>
                        <div class="dist-track"><div class="dist-fill fill-prob" id="bar-prob"></div></div>
                        <span class="dist-val" id="count-prob">0</span>
                    </div>
                </div>
            </aside>
        </div>
    </div>
    <script src="/static/app.js?v=6"></script>
</body>
</html>
